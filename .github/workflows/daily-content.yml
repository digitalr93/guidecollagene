name: Daily Content Generation

on:
  # Tous les jours à 7h00 heure de Paris (06:00 UTC en été)
  schedule:
    - cron: '0 6 * * *'
  # Déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      count:
        description: "Nombre d'articles à générer (défaut: 1)"
        required: false
        default: '1'
      slug:
        description: 'Slug spécifique (optionnel, ignore count si renseigné)'
        required: false
        default: ''
      force:
        description: 'Écraser les articles existants (true/false)'
        required: false
        default: 'false'
      skip_replenish:
        description: 'Ignorer le rechargement de la queue (true/false)'
        required: false
        default: 'false'

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Étape 1 : recharger la queue pour maintenir 30 sujets ──
      - name: Replenish content queue
        if: github.event.inputs.skip_replenish != 'true' && github.event.inputs.slug == ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🔄 Vérification et rechargement de la queue..."
          node scripts/replenish-queue.mjs --target=30

      # ── Étape 2 : générer les articles ──
      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: |
          COUNT=${{ github.event.inputs.count || '1' }}
          SLUG="${{ github.event.inputs.slug }}"

          if [ -n "$SLUG" ]; then
            echo "🎯 Génération ciblée : $SLUG"
            node scripts/generate-article.mjs --slug="$SLUG"
          else
            echo "🔄 Génération de $COUNT articles en séquence..."
            GENERATED=0
            for i in $(seq 1 $COUNT); do
              echo ""
              echo "━━━ Article $i/$COUNT ━━━"
              node scripts/generate-article.mjs
              STATUS=$?
              if [ $STATUS -eq 0 ]; then
                GENERATED=$((GENERATED + 1))
              else
                echo "⚠️ Erreur sur l'article $i, passage au suivant..."
              fi
              # Pause entre appels API (rate limiting)
              if [ $i -lt $COUNT ]; then
                sleep 3
              fi
            done
            echo ""
            echo "📊 Total : $GENERATED article(s) généré(s)"
          fi

      # ── Étape 3 : commit unique pour tout (articles + queue mise à jour) ──
      - name: Check generated files
        id: check_changes
        run: |
          NEW_ARTICLES=$(git status --porcelain | grep "src/content/articles/" | awk '{print $2}')
          QUEUE_CHANGED=$(git status --porcelain | grep "scripts/" | wc -l | tr -d ' ')

          if [ -n "$NEW_ARTICLES" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            COUNT=$(echo "$NEW_ARTICLES" | wc -l | tr -d ' ')
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            NAMES=$(echo "$NEW_ARTICLES" | xargs -I{} basename {} .md | tr '\n' ', ' | sed 's/,$//')
            echo "names=$NAMES" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Inclure les articles ET la queue mise à jour
          git add src/content/articles/ scripts/published.json scripts/content-queue.json
          git commit -m "content: add ${{ steps.check_changes.outputs.count }} articles

          ${{ steps.check_changes.outputs.names }}

          Auto-generated via GitHub Actions daily content pipeline.
          Model: claude-opus-4-5 (articles) · claude-haiku-4-5 (queue)"
          git push

      - name: Job summary
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "## ✅ ${{ steps.check_changes.outputs.count }} article(s) publiés aujourd'hui" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.check_changes.outputs.names }}" | tr ',' '\n' | sed 's/^ //' | while read name; do
              [ -n "$name" ] && echo "- \`$name\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Queue rechargée automatiquement → toujours 30 sujets prêts." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Push effectué → redéploiement Vercel déclenché." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ℹ️ Aucun article généré" >> $GITHUB_STEP_SUMMARY
            echo "Queue vide ou tous les articles déjà existants." >> $GITHUB_STEP_SUMMARY
          fi
